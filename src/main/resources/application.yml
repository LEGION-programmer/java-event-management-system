spring:
  application:
    name: event-management-system

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/event_management}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

security:
  jwt:
    secret: ${JWT_SECRET:VGhpcy1pcy1hLWRldmVsb3BtZW50LWp3dC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=}
    issuer: ${JWT_ISSUER:event-management-system}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

server:
  port: ${SERVER_PORT:8080}